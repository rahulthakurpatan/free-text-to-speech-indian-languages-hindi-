<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Vāṇī AI Studio | Realistic Hindi TTS</title>
    
    <meta name="description" content="Learn about Vāṇī AI Studio, India's premier neural text-to-speech platform for creators and educators.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Noto+Sans+Devanagari:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg-main: #020617; --card-bg: rgba(15, 23, 42, 0.6); --accent: #6366f1; }
        body { 
            background-color: var(--bg-main); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 100%); 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .hindi-font { font-family: 'Noto Sans Devanagari', sans-serif; }
        .glass { background: var(--card-bg); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .icon-container svg { display: inline-block; vertical-align: middle; }
        .animate-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", size }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name]);
            return <span ref={containerRef} className={`icon-container inline-flex items-center justify-center ${className}`} style={size ? {width: size, height: size} : {}}></span>;
        };

        const App = () => {
            const [lang, setLang] = useState('en');

            const content = {
                en: {
                    title: "Vāṇī AI", tagline: "Neural Text-to-Speech",
                    pageTitle: "About Our Studio",
                    backHome: "Back to Studio",
                    sections: [
                        { h: "Our Mission", p: "Vāṇī AI was built to empower Indian creators. We believe that professional, human-like voiceovers should be accessible to everyone, regardless of their budget. Our goal is to bridge the gap between AI technology and regional Indian languages." },
                        { h: "Next-Gen Technology", p: "We leverage the latest neural engines to provide over 15+ voice personas. From deep male tones to soft female voices, Vāṇī AI captures the subtle cadence and emotional depth required for storytelling and ads." },
                        { h: "Privacy First", p: "Unlike other platforms, we don't store your scripts or audio. Everything is processed in your local browser sandbox using your own API credentials, ensuring your data sovereignty." }
                    ]
                },
                hi: {
                    title: "वाणी एआई", tagline: "न्यूरल टेक्स्ट टू स्पीच",
                    pageTitle: "हमारे बारे में",
                    backHome: "वापस स्टूडियो",
                    sections: [
                        { h: "हमारा लक्ष्य", p: "वाणी एआई का निर्माण भारतीय क्रिएटर्स को सशक्त बनाने के लिए किया गया है। हमारा मानना है कि प्रोफेशनल आवाजें सभी के लिए उपलब्ध होनी चाहिए। हम एआई तकनीक और भारतीय क्षेत्रीय भाषाओं के बीच की दूरी को कम करना चाहते हैं।" },
                        { h: "आधुनिक तकनीक", p: "हम १५+ वॉयस पर्सनालिटीज प्रदान करने के लिए लेटेस्ट न्यूरल इंजन का उपयोग करते हैं। विज्ञापन हो या कहानी, हमारी आवाजें हर इमोशन को बखूबी समझती हैं।" },
                        { h: "प्राइवेसी सबसे पहले", p: "अन्य प्लेटफार्मों के विपरीत, हम आपकी स्क्रिप्ट या ऑडियो स्टोर नहीं करते हैं। सब कुछ आपके ब्राउज़र में ही प्रोसेस होता है, जिससे आपका डेटा पूरी तरह सुरक्षित रहता है।" }
                    ]
                }
            };

            return (
                <div className={`min-h-screen flex flex-col p-6 md:p-10 ${lang === 'hi' ? 'hindi-font' : ''}`}>
                    {/* Header */}
                    <header className="max-w-7xl mx-auto w-full flex flex-col items-center mb-16 text-center animate-up">
                        <div className="p-5 bg-indigo-600 rounded-[2rem] shadow-2xl mb-4">
                            <Icon name="mic-2" className="text-white w-8 h-8" />
                        </div>
                        <h1 className="text-4xl font-black text-white uppercase italic tracking-tighter">{content[lang].title}</h1>
                        <p className="text-[11px] text-indigo-400 font-black uppercase tracking-[0.4em] mt-1">{content[lang].tagline}</p>
                        
                        <button onClick={() => setLang(lang === 'en' ? 'hi' : 'en')} className="mt-8 px-6 py-3 glass rounded-2xl text-[10px] font-black uppercase text-indigo-400 hover:bg-white/5 transition-all flex items-center gap-3">
                             <Icon name="languages" size={14} /> {lang === 'en' ? "हिन्दी" : "English"}
                        </button>
                    </header>

                    <main className="max-w-4xl mx-auto w-full flex-1 animate-up" style={{animationDelay: '0.2s'}}>
                        <div className="glass rounded-[3.5rem] p-10 md:p-16 shadow-2xl relative overflow-hidden text-center md:text-left">
                            <div className="absolute top-0 right-0 p-12 opacity-5 rotate-12">
                                <Icon name="info" size={200} />
                            </div>

                            <h2 className="text-3xl font-black text-white mb-8 uppercase italic tracking-tighter text-indigo-500">
                                {content[lang].pageTitle}
                            </h2>

                            <div className="space-y-12 text-slate-400 text-sm leading-relaxed relative">
                                {content[lang].sections.map((section, i) => (
                                    <section key={i}>
                                        <h3 className="text-white font-black uppercase mb-3 flex items-center justify-center md:justify-start gap-4 italic tracking-tight">
                                            <div className="w-8 h-8 rounded-lg bg-indigo-600/20 flex items-center justify-center text-indigo-400 text-[10px] font-black">{i+1}</div>
                                            {section.h}
                                        </h3>
                                        <p className="md:pl-12">{section.p}</p>
                                    </section>
                                ))}

                                <div className="pt-12 border-t border-white/5 flex justify-center md:justify-between items-center">
                                    <a href="index.html" className="flex items-center gap-2 text-indigo-400 font-black hover:underline uppercase tracking-widest text-[10px]">
                                        <Icon name="arrow-left" size={14} /> {content[lang].backHome}
                                    </a>
                                    <Icon name="sparkles" className="hidden md:inline-block text-indigo-500/20" size={32} />
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="mt-20 text-center py-10 border-t border-white/5">
                        <p className="text-[10px] font-black text-slate-700 tracking-[0.5em] uppercase">© 2026 Vāṇī AI Studio • Made for Creators</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
