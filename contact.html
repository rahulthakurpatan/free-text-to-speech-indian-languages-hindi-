<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Vāṇī AI Studio | Get Support & Feedback</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Get in touch with Vāṇī AI Studio. Contact our support team for technical help, API key issues, or business inquiries. We are here to help Indian creators.">
    <meta name="robots" content="index, follow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'indi-orange': '#ea580c',
                        'indi-blue': '#1e40af',
                        'indi-bg': '#f8fafc'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #ffedd5 0%, #f8fafc 100%);
            min-height: 100vh;
            color: #0f172a;
        }
        .hindi-font { font-family: 'Noto Sans Devanagari', sans-serif; }
        
        .glass-card {
            background: #ffffff;
            border: 1px solid #1e293b; 
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.05);
            border-radius: 2.5rem;
        }
        
        .footer-card {
            border: 1px solid #1e293b;
        }

        .icon-box {
            background: linear-gradient(135deg, #f97316, #1e40af);
            color: white;
            border-radius: 1.25rem;
        }
        
        .animate-up { animation: fadeInUp 0.7s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        
        .contact-info-title {
            color: #1e40af;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", size = 20 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [lang, setLang] = useState('en');

            const i18n = {
                hi: {
                    tagline: "सम्पर्क करें | हम आपकी सहायता के लिए तैयार हैं",
                    backBtn: "वापस स्टूडियो",
                    title: "Contact Us",
                    emailLabel: "सपोर्ट ईमेल",

                    ],
                    footerText: "भारत के डिजिटल क्रिएटर के लिए निर्मित"
                },
                en: {
                    tagline: "Get in Touch | We are ready to help",
                    backBtn: "Back to Studio",
                    title: "Contact Us",
                    emailLabel: "Support Email",
                    responseTitle: "Response Time",
                    responseDesc: "We usually respond within 24-48 hours.",
                    
                    introTitle: "Why Contact Us?",
                    introDesc: "Whether you have a suggestion to improve Vāṇī AI Studio or you're facing technical difficulties, our support team is here to guide you every step of the way.",
                    
                    details: [

                        { title: "Feedback & Ideas", icon: "message-square", text: "Your ideas help us evolve. Share your suggestions to make Vani AI better." },
                        { title: "Business Inquiries", icon: "briefcase", text: "For collaboration or commercial proposals, feel free to reach out directly." }

                    footerText: "Built for Indian Digital Creators"

                        <div className="flex w-full justify-end mb-4">

                            >
                                <Icon name="languages" size={14} />
                                {lang === 'hi' ? "English" : "हिन्दी"}
                            </button>

                                                    <p className="text-sm text-slate-600 font-bold leading-relaxed">{detail.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                    {/* Email Card */}
                                    <div className="p-10 bg-indi-blue text-white rounded-[3rem] border border-slate-900 shadow-2xl flex flex-col items-center text-center">

                                            <Icon name="mail" size={32} className="text-indi-orange" />
                                        </div>
                                        <h3 className="text-sm font-black uppercase tracking-[0.3em] text-orange-200 mb-2">{t.emailLabel}</h3>
                                        <p className="text-xl md:text-2xl font-black tracking-tight break-all">rahulthakurpatan@gmail.com</p>
                                        
                                        <div className="mt-8 pt-8 border-t border-white/10 w-full">
                                            <h4 className="text-[10px] font-black uppercase tracking-widest text-orange-200 mb-1">{t.responseTitle}</h4>
                                            <p className="text-xs font-bold text-blue-100">{t.responseDesc}</p>
                                        </div>
                                    </div>

                                    {/* Location Info */}
                                    <div className="glass-card p-8 border-slate-900 shadow-xl flex items-center gap-6">
                                        <div className="p-4 bg-slate-50 rounded-2xl">
                                            <Icon name="map-pin" className="text-indi-blue" size={24} />
                                        </div>
                                        <div>
                                            <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Location</h4>
                                            <p className="text-sm font-black text-slate-900 uppercase tracking-tight">Chhattisgarh, India</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* BOTTOM BACK BUTTON */}
                            <div className="mt-20 pt-12 border-t border-slate-200 flex justify-center">
                                <a href="index.html" className="flex items-center gap-3 bg-indi-blue text-white px-12 py-5 rounded-[2.5rem] font-black text-sm uppercase tracking-[0.2em] hover:bg-blue-800 transition-all shadow-xl border border-slate-900 active:scale-95">
                                    <Icon name="sparkles" size={18} /> {t.backBtn}
                                </a>
                            </div>
                        </div>
                    </main>

                    {/* Footer (Same as Index) */}
                    <footer className="max-w-7xl mx-auto w-full mt-40 pb-20 border-t border-slate-900 pt-20">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-8 px-2">
                            {[
                                { icon: "info", title: lang === 'en' ? "About Us" : "हमारे बारे में", link: "about.html", body: "India's premium neural studio for creators looking for high-fidelity voices." },
                                { icon: "shield-check", title: lang === 'en' ? "Privacy" : "गोपनीयता", link: "privacy-policy.html", body: "100% Client-side privacy. Your keys are never saved on servers." },
                                { icon: "file-text", title: lang === 'en' ? "Terms" : "नियम", link: "terms.html", body: "Commercial rights included for all generated audio content." },
                                { icon: "mail", title: lang === 'en' ? "Contact" : "संपर्क", link: "contact.html", body: "Reach out to our Indian support community for quick help." },
                                { icon: "book-open", title: lang === 'en' ? "Blog" : "ब्लॉग", link: "blog.html", body: "Read latest tips on AI voiceovers and content monetization." }
                            ].map((card, i) => (
                                <a href={card.link} key={i} className="glass-card footer-card p-8 hover:border-indi-orange transition-all group shadow-sm flex flex-col">
                                    <div className="w-12 h-12 bg-slate-100 text-indi-blue rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indi-blue group-hover:text-white transition-all shadow-inner border border-slate-200">
                                        <Icon name={card.icon} size={22} />
                                    </div>
                                    <h4 className="text-base font-black text-slate-900 mb-3 uppercase tracking-tighter italic flex items-center justify-between">
                                        {card.title}
                                        <Icon name="arrow-up-right" size={14} className="opacity-0 group-hover:opacity-100 transition-all" />
                                    </h4>
                                    <p className="text-[11px] text-slate-800 leading-relaxed font-bold">{card.body}</p>
                                </a>
                            ))}
                        </div>
                        <div className="flex flex-col md:flex-row justify-between items-center mt-24 gap-10 border-t border-slate-300 pt-16 px-6 text-[10px] font-black text-slate-800 uppercase tracking-widest italic">
                            <div className="flex items-center gap-4">
                                <Icon name="sparkles" className="text-indi-orange" size={26} />
                                <div>
                                    <p className="text-2xl font-black text-indi-blue tracking-tighter uppercase italic">Vāṇī Studio</p>
                                    <p>Powered by Gemini Flash 2.5</p>
                                </div>
                            </div>
                            <div className="flex gap-10">
                                <span className="flex items-center gap-2 text-slate-900"><Icon name="flag" size={14} className="text-indi-orange" /> Made in Bharat</span>
                                <span className="flex items-center gap-2 text-slate-900"><Icon name="cpu" size={14} className="text-indi-blue" /> Version 5.0 Stable</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
