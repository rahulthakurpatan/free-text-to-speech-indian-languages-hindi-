    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", size = 20 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [lang, setLang] = useState('en'); 
            const [isConfigured, setIsConfigured] = useState(false);
            const [apiKey, setApiKey] = useState('');
            const [text, setText] = useState('');
            const [voiceProfile, setVoiceProfile] = useState('Leda');
            const [audioUrl, setAudioUrl] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState(null);
            
            const audioRef = useRef(null);

            const i18n = {
                hi: {
                    tagline: "15+ न्यूरल वॉयस इंजन | मुफ्त हिंदी TTS",
                    setupHeader: "सेटअप गाइड",
                    step1: "गूगल एआई स्टूडियो पोर्टल पर जाएं और फ्री API Key बनाएं।",
                    step2: "API Key को कॉपी करें और एक्टिवेशन बॉक्स में पेस्ट करें।",
                    step3: "सक्रिय करें बटन दबाएं और हाई-क्वालिटी आवाजों का आनंद लें।",
                    activationTitle: "स्टूडियो सक्रिय करें",
                    btnActivate: "अभी सक्रिय करें",
                    btnOpenStudio: "गूगल एआई स्टूडियो खोलें",
                    scriptHeader: "हिंदी स्क्रिप्ट एडिटर",
                    placeholder: "अपना हिंदी संदेश यहां लिखें...",
                    voiceHeader: "15 प्रीमियम आवाजों में से चुनें",
                    btnGenerate: "AI आवाज बनाएं",
                    statusGenerating: "आवाज बन रही है...",
                    outputHeader: "स्टूडियो आउटपुट",
                    queueEmpty: "ऑडियो कतार खाली है",
                    readyUse: "उपयोग के लिए तैयार",
                    resetKey: "कुंजी बदलें",
                    aboutTitle: "हमारे बारे में",
                    privacyTitle: "गोपनीयता",
                    termsTitle: "नियम",
                    contactTitle: "संपर्क",
                    blogTitle: "ब्लॉग",
                    quotaError: "Bhai, free limit khatam ho gayi hai (Quota Exceeded). Thodi der baad try karein ya naya key use karein."
                },
                en: {
                    tagline: "15+ Neural Voice Engines | Free Hindi TTS",
                    setupHeader: "Setup Guide",
                    step1: "Go to Google AI Studio portal and create a free API Key.",
                    step2: "Copy the API Key and paste it in the activation box.",
                    step3: "Click Activate and enjoy high-quality AI voices.",
                    activationTitle: "Studio Activation",
                    btnActivate: "ACTIVATE NOW",
                    btnOpenStudio: "Open Google AI Studio",
                    scriptHeader: "Hindi Script Editor",
                    placeholder: "Write your Hindi message here...",
                    voiceHeader: "Choose From 15 Premium Voices",
                    btnGenerate: "GENERATE AI VOICE",
                    statusGenerating: "SYNTHESIZING...",
                    outputHeader: "Studio Output",
                    queueEmpty: "Audio Queue Empty",
                    readyUse: "Ready to Use",
                    resetKey: "Reset Key",
                    aboutTitle: "About Us",
                    privacyTitle: "Privacy",
                    termsTitle: "Terms",
                    contactTitle: "Contact",
                    blogTitle: "Blog",
                    quotaError: "Limit reached (Quota Exceeded). Please wait a few minutes or use a different API key."
                }
            };

            const t = i18n[lang];

            useEffect(() => {
                const saved = localStorage.getItem('vani_premium_key_v3');
                if (saved) {
                    setApiKey(saved);
                    setIsConfigured(true);
                }
                if(window.lucide) window.lucide.createIcons();
            }, []);

            const voices = [
                { id: 'Leda', name: 'Priya', type: 'Female', mood: 'Sweet' },
                { id: 'Aoede', name: 'Anjali', type: 'Female', mood: 'Soft' },
                { id: 'Charon', name: 'Arjun', type: 'Male', mood: 'Narrator' },
                { id: 'Kore', name: 'Amit', type: 'Male', mood: 'Bold' },
                { id: 'Fenrir', name: 'Rahul', type: 'Male', mood: 'Smooth' },
                { id: 'Despina', name: 'Meera', type: 'Female', mood: 'Ads' },
                { id: 'Callirrhoe', name: 'Kavita', type: 'Female', mood: 'Deep' },
                { id: 'Puck', name: 'Ishan', type: 'Male', mood: 'Young' },
                { id: 'Zephyr', name: 'Sameer', type: 'Male', mood: 'Classic' },
                { id: 'Orus', name: 'Vikram', type: 'Male', mood: 'Formal' },
                { id: 'Enceladus', name: 'Sagar', type: 'Male', mood: 'Crisp' },
                { id: 'Iapetus', name: 'Rohan', type: 'Male', mood: 'Warm' },
                { id: 'Autonoe', name: 'Shreya', type: 'Female', mood: 'Gentle' },
                { id: 'Umbriel', name: 'Aditya', type: 'Male', mood: 'Low' },
                { id: 'Algieba', name: 'Pooja', type: 'Female', mood: 'Clear' }
            ];

            const pcmToWav = (b64, rate = 24000) => {
                const bin = atob(b64);
                const bytes = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                const pcm = new Int16Array(bytes.buffer);
                const buffer = new ArrayBuffer(44 + pcm.length * 2);
                const view = new DataView(buffer);
                const s = (o, str) => { for (let i = 0; i < str.length; i++) view.setUint8(o + i, str.charCodeAt(i)); };
                s(0, 'RIFF'); view.setUint32(4, 36 + pcm.length * 2, true); s(8, 'WAVE'); s(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, rate, true); view.setUint32(28, rate * 2, true); view.setUint16(32, 2, true);
                view.setUint16(34, 16, true); s(36, 'data'); view.setUint32(40, pcm.length * 2, true);
                for (let i = 0; i < pcm.length; i++) view.setInt16(44 + i * 2, pcm[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateAudio = async () => {
                if (!text.trim()) return;
                setIsGenerating(true); 
                setError(null);
                setAudioUrl(null);
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceProfile } } }
                            }
                        })
                    });

                    if (response.status === 429) {
                        throw new Error(t.quotaError);
                    }

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "API connection failed.");
                    }
                    
                    const data = await response.json();
                    const audioBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    
                    if (!audioBase64) throw new Error("Audio generation failed.");
                    
                    const blob = pcmToWav(audioBase64, 24000);
                    const url = URL.createObjectURL(blob);
                    setAudioUrl(url);
                    
                    if (audioRef.current) { 
                        audioRef.current.src = url; 
                        audioRef.current.play().catch(e => console.log("Autoplay blocked")); 
                    }
                } catch (err) { 
                    setError(err.message); 
                } finally { 
                    setIsGenerating(false); 
                }
            };

            return (
                <div className={`min-h-screen flex flex-col p-4 md:p-10 animate-up ${lang === 'hi' ? 'hindi-font' : ''}`}>

                            >
                                <Icon name="languages" size={14} />
                                {lang === 'hi' ? "English" : "हिन्दी"}
                            </button>
                        </div>
                        <div className="icon-box p-5 shadow-xl mb-6 ring-4 ring-orange-100">
                            <Icon name="mic-2" size={32} />
                        </div>
                        <h1 className="text-5xl font-black text-indi-blue tracking-tighter uppercase italic">Vāṇī Studio</h1>
                        <p className="text-[11px] text-indi-orange font-black uppercase tracking-[0.4em] mt-2">{t.tagline}</p>
                        
                        <div className="w-full max-w-2xl mt-10 glass-card rounded-full py-3 marquee border-slate-900 overflow-hidden">
                            <div className="marquee-content">
                                {["HINDI", "MARATHI", "TAMIL", "TELUGU", "BENGALI", "GUJARATI", "PUNJABI", "SANSKRIT"].map((l, i) => (
                                    <span key={i} className="mx-8 text-[11px] font-black text-slate-900 uppercase tracking-widest inline-flex items-center gap-2">
                                        <div className="w-2 h-2 bg-indi-orange rounded-full"></div> {l}
                                    </span>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full flex-1">
                        {!isConfigured ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-stretch max-w-6xl mx-auto">
                                <div className="glass-card p-10 md:p-16 flex flex-col bg-indi-blue text-white overflow-hidden relative border-slate-900 shadow-2xl">
                                    <div className="absolute top-0 right-0 p-12 opacity-5"><Icon name="cpu" size={200} /></div>
                                    <h2 className="text-3xl font-black mb-10 uppercase italic tracking-tighter text-indi-orange">{t.setupHeader}</h2>
                                    <div className="space-y-8 flex-1">
                                        {[t.step1, t.step2, t.step3].map((step, i) => (
                                            <div key={i} className="flex gap-6 items-start">
                                                <div className="w-10 h-10 rounded-2xl bg-white/10 flex items-center justify-center font-black text-indi-orange border border-white/5 shadow-inner">{i+1}</div>
                                                <div><p className="text-sm text-blue-50 font-bold leading-relaxed">{step}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="glass-card p-10 md:p-16 flex flex-col justify-center text-center border-slate-900">
                                    <Icon name="key" size={48} className="text-indi-orange mb-8 mx-auto" />
                                    <h3 className="text-2xl font-black text-slate-900 uppercase italic mb-10">{t.activationTitle}</h3>
                                    
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="mb-6 w-full py-4 bg-white text-indi-blue border-2 border-indi-blue rounded-[2rem] font-black text-sm uppercase tracking-widest hover:bg-blue-50 transition-all flex items-center justify-center gap-2">
                                        {t.btnOpenStudio} <Icon name="external-link" size={16} />
                                    </a>

                                    <input 
                                        type="password" 
                                        value={apiKey} 
                                        onChange={(e) => setApiKey(e.target.value)} 
                                        placeholder="Paste API Key (AIzaSy...)" 
                                        className="w-full p-6 rounded-[2rem] border border-slate-900 bg-slate-50 mb-8 outline-none focus:ring-4 ring-orange-100 text-center font-mono text-lg transition-all text-slate-900 placeholder:text-slate-400" 
                                    />
                                    <button 
                                        onClick={() => { if(apiKey.trim().length > 20) { localStorage.setItem('vani_premium_key_v3', apiKey.trim()); setIsConfigured(true); } }} 
                                        className="w-full py-6 bg-indi-orange text-white rounded-[2rem] font-black text-xl hover:bg-orange-600 transition-all shadow-xl active:scale-95"
                                    >
                                        {t.btnActivate}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                <div className="lg:col-span-8 space-y-8">
                                    <div className="glass-card p-10 border-slate-900 shadow-xl">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-[11px] font-black uppercase text-slate-900 tracking-widest flex items-center gap-2 italic">
                                                <Icon name="file-text" size={16} /> {t.scriptHeader}

                                        <textarea

                                    </div>

                                    <div className="glass-card p-10 border-slate-900 shadow-xl">

                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">

                                                    <p className={`text-[11px] font-black uppercase tracking-tighter ${voiceProfile === v.id ? 'text-indi-orange' : 'text-slate-800'}`}>{v.name}</p>
                                                    <p className="text-[8px] font-black text-slate-500 mt-1 uppercase italic">{v.mood}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={generateAudio} 
                                        disabled={isGenerating || !text.trim()}
                                        className="w-full py-8 bg-indi-blue text-white rounded-[2.5rem] text-2xl font-black shadow-2xl hover:bg-blue-800 transition-all active:scale-[0.98] disabled:opacity-50 flex items-center justify-center gap-4"
                                    >
                                        {isGenerating ? <div className="custom-loader"></div> : <Icon name="wand-2" size={32} className="text-indi-orange" />}
                                        {isGenerating ? t.statusGenerating : t.btnGenerate}
                                    </button>
                                    {error && <div className="p-4 bg-red-50 text-red-700 rounded-2xl border border-red-300 text-xs font-black flex items-center gap-2 shadow-sm"><Icon name="alert-circle" size={16} /> {error}</div>}
                                </div>
                                
                                <div className="lg:col-span-4 space-y-8">
                                    <div className="glass-card p-10 sticky top-10 text-center border-slate-900 shadow-xl">
                                        <h3 className="text-[11px] font-black uppercase text-slate-900 tracking-widest mb-12 flex items-center justify-center gap-2 italic">
                                            <Icon name="headphones" size={16} /> {t.outputHeader}
                                        </h3>
                                        {!audioUrl ? (
                                            <div className="py-24 border-2 border-dashed rounded-[2.5rem] border-slate-300 flex flex-col items-center justify-center opacity-40">
                                                <Icon name="music" size={56} className="text-slate-400 mb-6" />
                                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-600">{t.queueEmpty}</p>
                                            </div>
                                        ) : (
