<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vāṇī AI - Free Hindi Text to Speech (TTS) Studio | Realistic AI Voices</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Vāṇī AI: The most realistic Hindi & Indian language AI voice generator. Convert any text to speech for free using Gemini 2.5 Neural Engine.">
    <meta name="keywords" content="Hindi Text to Speech, Free TTS Hindi, AI Voice Generator India, Realistic Indian Voices, Gemini TTS, Convert Text to Audio, Marathi TTS, Tamil TTS">
    <meta name="author" content="Vāṇī Studio">
    <meta property="og:title" content="Vāṇī AI - Best Free Hindi TTS Engine">
    <meta property="og:description" content="Generate studio-quality voiceovers for free.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Noto+Sans+Devanagari:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-main: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --accent: #6366f1;
        }
        body {
            background-color: var(--bg-main);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .hindi-font { font-family: 'Noto Sans Devanagari', sans-serif; }
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Language Scroller Animation */
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            position: relative;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .pulse-ring {
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: absolute;
            animation: ripple 4s infinite cubic-bezier(0, 0, 0.2, 1);
            opacity: 0;
        }
        @keyframes ripple {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .animate-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", size }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name]);
            return <span ref={containerRef} className={`icon-container inline-flex items-center justify-center ${className}`} style={size ? {width: size, height: size} : {}}></span>;
        };

        const App = () => {
            const [lang, setLang] = useState('en');
            const [appLoading, setAppLoading] = useState(true);
            const [isConfigured, setIsConfigured] = useState(false);
            const [userKey, setUserKey] = useState('');
            const [showKey, setShowKey] = useState(false);
            const [text, setText] = useState('');
            const [selectedVoice, setSelectedVoice] = useState('Leda');
            const [isGenerating, setIsGenerating] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            const audioRef = useRef(null);
            const apiStudioUrl = "https://aistudio.google.com/app/apikey";

            // Expanded Voices (15)
            const voices = [
                { id: 'Leda', name: 'Priya', type: 'Female', desc: 'Sweet' },
                { id: 'Aoede', name: 'Anjali', type: 'Female', desc: 'Soft' },
                { id: 'Callirrhoe', name: 'Kavita', type: 'Female', desc: 'Mature' },
                { id: 'Despina', name: 'Meera', type: 'Female', desc: 'Ads' },
                { id: 'Erinome', name: 'Sneha', type: 'Female', desc: 'Vlog' },
                { id: 'Kore', name: 'Amit', type: 'Male', desc: 'Bold' },
                { id: 'Fenrir', name: 'Rahul', type: 'Male', desc: 'Smooth' },
                { id: 'Charon', name: 'Arjun', type: 'Male', desc: 'Dynamic' },
                { id: 'Iapetus', name: 'Vikram', type: 'Male', desc: 'Helpful' },
                { id: 'Orus', name: 'Sanjay', type: 'Male', desc: 'Steady' },
                { id: 'Puck', name: 'Karan', type: 'Male', desc: 'Casual' },
                { id: 'Zephyr', name: 'Akash', type: 'Male', desc: 'Cinema' },
                { id: 'Mimas', name: 'Sameer', type: 'Male', desc: 'Story' },
                { id: 'Himalia', name: 'Sonia', type: 'Female', desc: 'Formal' },
                { id: 'Eurydice', name: 'Ishita', type: 'Female', desc: 'News' }
            ];

            const languages = ["HINDI", "MARATHI", "BENGALI", "TAMIL", "TELUGU", "KANNADA", "GUJARATI", "PUNJABI", "MALAYALAM", "ODIA", "URDU", "SANSKRIT"];

            const t = {
                en: {
                    title: "Vāṇī AI", tagline: "Neural Text-to-Speech Engine",
                    scrollText: "Easily convert any language text to realistic AI speech",
                    setup: "Activation Portal", activate: "Activate Studio",
                    script: "Enter Hindi Script", voice: "Select Voice Persona", gen: "Synthesize Audio"
                },
                hi: {
                    title: "वाणी एआई", tagline: "न्यूरल टेक्स्ट टू स्पीच इंजन",
                    scrollText: "किसी भी भाषा के टेक्स्ट को आसानी से एआई आवाज में बदलें",
                    setup: "एक्टिवेशन पोर्टल", activate: "स्टूडियो सक्रिय करें",
                    script: "हिंदी टेक्स्ट लिखें", voice: "आवाज का चयन करें", gen: "आवाज जनरेट करें"
                }
            };

            useEffect(() => {
                const timer = setTimeout(() => setAppLoading(false), 2000);
                const saved = localStorage.getItem('vani_seo_final_v1');
                if (saved) { setUserKey(saved); setIsConfigured(true); }
                
                // Schema Markup injection
                const schema = {
                  "@context": "https://schema.org",
                  "@type": "WebApplication",
                  "name": "Vāṇī AI Studio",
                  "applicationCategory": "Multimedia",
                  "operatingSystem": "Web",
                  "description": "Premium Hindi and Indian Language Text to Speech Studio."
                };
                const script = document.createElement('script');
                script.type = 'application/ld+json';
                script.text = JSON.stringify(schema);
                document.head.appendChild(script);

                return () => clearTimeout(timer);
            }, []);

            const pcmToWav = (b64, rate) => {
                const bin = atob(b64), pcm = new Int16Array(new Uint8Array(bin.length).map((_,i) => bin.charCodeAt(i)).buffer);
                const dataSize = pcm.length * 2, buf = new ArrayBuffer(44 + dataSize), v = new DataView(buf);
                const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
                s(0, 'RIFF'); v.setUint32(4, 36 + dataSize, true); s(8, 'WAVE'); s(12, 'fmt ');
                v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
                v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true);
                v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, pcm.length * 2, true);
                for (let i = 0; i < pcm.length; i++) v.setInt16(44 + i * 2, pcm[i], true);
                return new Blob([buf], { type: 'audio/wav' });
            };

            const handleGenerate = async () => {
                if (!text.trim()) return;
                setIsGenerating(true); setError(null);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${userKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: selectedVoice } } } }
                        })
                    });
                    if (!response.ok) throw new Error("API Limit reached or Key Invalid.");
                    const res = await response.json();
                    const b64 = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    const url = URL.createObjectURL(pcmToWav(b64, 24000));
                    setAudioUrl(url);
                    if (audioRef.current) { audioRef.current.src = url; audioRef.current.play(); }
                } catch (e) { setError(e.message); } finally { setIsGenerating(false); }
            };

            if (appLoading) {
                return (
                    <div className="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center">
                        <div className="w-16 h-16 border-4 border-indigo-500/10 border-t-indigo-500 rounded-full animate-spin mb-6"></div>
                        <h2 className="text-xs font-black text-slate-500 tracking-[0.4em] uppercase animate-pulse italic">Vāṇī Studio Loading</h2>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen flex flex-col p-4 md:p-10 ${lang === 'hi' ? 'hindi-font' : ''}`}>
                    {/* Header */}
                    <header className="max-w-7xl mx-auto w-full flex flex-col items-center mb-12 gap-6 text-center">
                        <div className="flex flex-col items-center gap-4">
                            <div className="p-5 bg-indigo-600 rounded-[2rem] shadow-2xl shadow-indigo-600/30 ring-1 ring-white/10"><Icon name="mic-2" className="text-white w-8 h-8" /></div>
                            <div>
                                <h1 className="text-4xl font-black tracking-tight text-white uppercase italic tracking-tighter">Vāṇī AI</h1>
                                <p className="text-[11px] text-indigo-400 font-black uppercase tracking-[0.4em] mt-1">{t[lang].tagline}</p>
                            </div>
                        </div>
                        
                        {/* Language Scroller & Tagline */}
                        <div className="w-full max-w-2xl">
                           <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 italic">{t[lang].scrollText}</p>
                           <div className="marquee glass py-3 rounded-full border border-indigo-500/10">
                                <div className="marquee-content">
                                    {[...languages, ...languages].map((l, i) => (
                                        <span key={i} className="mx-6 text-[10px] font-black text-slate-400 flex items-center gap-2 inline-flex">
                                            <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full"></div> {l}
                                        </span>
                                    ))}
                                </div>
                           </div>
                        </div>

                        <button onClick={() => setLang(lang === 'en' ? 'hi' : 'en')} className="px-6 py-3 glass rounded-2xl text-[10px] font-black uppercase text-indigo-400 hover:bg-white/5 transition-all flex items-center gap-3 tracking-widest absolute top-8 right-8">
                            <Icon name="languages" size={14} /> {lang === 'en' ? "हिन्दी" : "English"}
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto w-full flex-1">
                        {!isConfigured ? (
                            /* --- SPLIT SETUP PAGE --- */
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 items-stretch animate-up">
                                
                                {/* Left Column: TTS Engine Visualizer */}
                                <div className="lg:col-span-5 glass rounded-[3.5rem] p-12 flex flex-col items-center justify-center relative overflow-hidden text-center space-y-12">
                                    <div className="absolute inset-0 opacity-5 pointer-events-none">
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full border border-indigo-500 rounded-full animate-ping"></div>
                                    </div>
                                    
                                    <div className="relative w-40 h-40 flex items-center justify-center">
                                        <div className="pulse-ring"></div>
                                        <div className="pulse-ring" style={{animationDelay: '1s'}}></div>
                                        <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center z-10 shadow-2xl shadow-indigo-600/50">
                                            <Icon name="cpu" size={40} className="text-white animate-pulse" />
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <h3 className="text-2xl font-black text-white leading-tight">Universal <br/>Text-to-Speech <br/>Engine</h3>
                                        <div className="flex justify-center gap-4">
                                            <div className="p-3 glass rounded-2xl border-indigo-500/20"><Icon name="type" size={20} className="text-indigo-400"/></div>
                                            <Icon name="arrow-right" className="text-slate-700 mt-3" size={14}/>
                                            <div className="p-3 glass rounded-2xl border-indigo-500/20"><Icon name="brain-circuit" size={20} className="text-indigo-400"/></div>
                                            <Icon name="arrow-right" className="text-slate-700 mt-3" size={14}/>
                                            <div className="p-3 glass rounded-2xl border-indigo-500/20"><Icon name="volume-2" size={20} className="text-indigo-400"/></div>
                                        </div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">India's Next-Gen Dubbing Tool</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 w-full">
                                        <div className="bg-slate-800/40 p-4 rounded-3xl border border-white/5 flex items-center gap-3">
                                            <Icon name="check-circle" size={14} className="text-emerald-500"/>
                                            <span className="text-[9px] font-black uppercase text-slate-400">15+ AI Voices</span>
                                        </div>
                                        <div className="bg-slate-800/40 p-4 rounded-3xl border border-white/5 flex items-center gap-3">
                                            <Icon name="check-circle" size={14} className="text-emerald-500"/>
                                            <span className="text-[9px] font-black uppercase text-slate-400">High Fidelity</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Column: Activation Guide */}
                                <div className="lg:col-span-7 glass rounded-[3.5rem] p-10 md:p-16 relative">
                                    <h2 className="text-3xl font-black text-white mb-10 tracking-tighter uppercase italic">{t[lang].setup}</h2>
                                    
                                    <div className="space-y-8 mb-14">
                                        {[
                                            lang === 'en' ? "Get your personal 'API Key' from Google AI Studio portal." : "गूगल एआई स्टूडियो पोर्टल से अपनी व्यक्तिगत 'एपीआई कुंजी' प्राप्त करें।",
                                            lang === 'en' ? "Copy the URL below and open it in a new tab." : "नीचे दिए गए यूआरएल को कॉपी करें और इसे एक नए टैब में खोलें।",
                                            lang === 'en' ? "Generate a free Gemini API Key inside the console." : "कंसोल के अंदर एक मुफ्त जेमिनी एपीआई की (Key) जनरेट करें।",
                                            lang === 'en' ? "Paste that secret key in the box below to activate." : "एक्टिवेट करने के लिए नीचे दिए गए बॉक्स में उस गुप्त कुंजी को पेस्ट करें।"
                                        ].map((step, i) => (
                                            <div key={i} className="flex gap-6 items-start group">
                                                <div className="w-8 h-8 rounded-xl bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center text-[11px] font-black text-indigo-400 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-xl">{i+1}</div>
                                                <p className="text-sm font-bold text-slate-400 leading-relaxed">{step}</p>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex flex-col sm:flex-row gap-4 mb-12">
                                        <button onClick={() => {navigator.clipboard.writeText(apiStudioUrl); setCopied(true); setTimeout(()=>setCopied(false), 2000)}} className="flex-1 py-5 bg-slate-800 rounded-3xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3 border border-white/5 hover:bg-slate-700 transition-all">
                                            {copied ? <Icon name="check" className="text-green-400" size={18} /> : <Icon name="copy" size={18} />} {copied ? "Link Copied" : "Copy Portal Link"}
                                        </button>
                                        <a href={apiStudioUrl} target="_blank" rel="noopener noreferrer" className="flex-1 py-5 bg-indigo-600 rounded-3xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3 shadow-2xl shadow-indigo-600/20 hover:scale-[1.02] transition-all">
                                            <Icon name="external-link" size={18} /> Open Studio
                                        </a>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="relative">
                                            <input type={showKey ? "text" : "password"} value={userKey} onChange={e => setUserKey(e.target.value)} placeholder="Paste API Key (AIzaSy...)" className="w-full bg-slate-900 border border-white/5 rounded-3xl py-6 px-10 text-sm outline-none focus:border-indigo-500 transition-all text-white font-mono placeholder:text-slate-800" />
                                            <button onClick={() => setShowKey(!showKey)} className="absolute right-8 top-1/2 -translate-y-1/2 text-slate-600 hover:text-white"><Icon name={showKey ? "eye-off" : "eye"} size={22} /></button>
                                        </div>
                                        <button onClick={() => { if(userKey.length > 20) { localStorage.setItem('vani_seo_final_v1', userKey); setIsConfigured(true); } }} className="w-full py-6 bg-white text-indigo-950 rounded-[2.5rem] font-black text-xl hover:bg-slate-200 transition-all active:scale-95 shadow-2xl">
                                            {t[lang].activate}
                                        </button>
                                        {error && <p className="text-red-400 text-[10px] font-black text-center mt-4 tracking-widest animate-pulse uppercase">{error}</p>}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* --- MAIN STUDIO PAGE --- */
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 animate-fade">
                                <div className="lg:col-span-8 space-y-8">
                                    <div className="glass rounded-[3.5rem] p-12 shadow-2xl relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-12 opacity-5 group-hover:rotate-12 transition-transform duration-1000"><Icon name="languages" size={180} /></div>
                                        <div className="flex justify-between items-center mb-8 relative">
                                            <h2 className="text-2xl font-black flex items-center gap-4 text-white italic tracking-tighter"><Icon name="edit-3" className="text-indigo-500" size={24}/> {t[lang].script}</h2>
                                            <button onClick={() => setText('')} className="p-3 bg-white/5 rounded-2xl text-slate-500 hover:text-red-400 transition-all"><Icon name="trash-2" size={22} /></button>
                                        </div>
                                        <textarea value={text} onChange={e => setText(e.target.value)} placeholder="यहाँ अपना हिंदी या किसी भी भाषा का मैसेज लिखें..." className="w-full h-80 bg-transparent border-none outline-none text-3xl font-medium text-white resize-none leading-relaxed placeholder:text-slate-800" />
                                        
                                        <div className="mt-12 pt-12 border-t border-white/5">
                                            <h3 className="text-[11px] font-black uppercase text-slate-500 tracking-[0.3em] mb-10 flex items-center gap-2"><Icon name="user-check" size={14}/> {t[lang].voice}</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-5 gap-5 max-h-[400px] overflow-y-auto pr-3 custom-scrollbar">
                                                {voices.map(v => (
                                                    <button key={v.id} onClick={() => setSelectedVoice(v.id)} className={`p-6 rounded-[2rem] border transition-all text-center group ${selectedVoice === v.id ? 'bg-indigo-600/10 border-indigo-500 shadow-xl' : 'bg-white/5 border-transparent hover:border-white/10'}`}>
                                                        <div className={`w-12 h-12 mx-auto rounded-2xl flex items-center justify-center mb-4 ${selectedVoice === v.id ? 'bg-indigo-600 text-white shadow-2xl' : 'bg-slate-800 text-slate-400'}`}>
                                                            <Icon name={v.type === 'Female' ? "user" : "user-check"} size={20} />
                                                        </div>
                                                        <p className="text-sm font-black text-white mb-1 tracking-tight">{v.name}</p>
                                                        <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">{v.desc}</p>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleGenerate} disabled={isGenerating || !text.trim()} className="w-full py-8 bg-gradient-to-r from-indigo-600 to-indigo-500 rounded-[3rem] font-black text-2xl flex items-center justify-center gap-6 text-white shadow-2xl shadow-indigo-600/40 hover:scale-[1.01] transition-all disabled:opacity-50 active:scale-95">
                                        {isGenerating ? <Icon name="loader" className="animate-spin" size={32} /> : <Icon name="wand-2" size={32} />}
                                        <span>{isGenerating ? "Synthesizing..." : t[lang].gen}</span>
                                    </button>
                                </div>

                                <div className="lg:col-span-4 space-y-8">
                                    <div className="glass rounded-[3.5rem] p-12 sticky top-10 shadow-2xl border border-white/5">
                                        <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] mb-12 flex items-center gap-2"><Icon name="headphones" size={14}/> Output Console</h3>
                                        {!audioUrl ? (
                                            <div className="py-28 text-center border-2 border-dashed border-white/5 rounded-[2.5rem] bg-black/20 opacity-30 group">
                                                <Icon name="music" className="mx-auto mb-6 w-16 h-16 transition-all" />
                                                <p className="text-[11px] font-black uppercase tracking-[0.2em] leading-loose">Engine Ready<br/>Type something</p>
                                            </div>
                                        ) : (
                                            <div className="bg-slate-900/80 rounded-[3rem] p-10 space-y-10 shadow-2xl border border-white/5 animate-fade">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-[10px] font-black text-indigo-400 flex items-center gap-3 uppercase tracking-[0.2em]"><Icon name="check-circle" size={18} /> Render Ready</span>
                                                    <button onClick={() => {const a = document.createElement('a'); a.href = audioUrl; a.download = 'VaniAI.wav'; a.click();}} className="p-4 bg-indigo-600 text-white rounded-2xl shadow-xl hover:bg-indigo-500 transition-all active:scale-90"><Icon name="download" size={24} /></button>
                                                </div>
                                                <audio ref={audioRef} src={audioUrl} controls className="w-full accent-indigo-500" />
                                            </div>
                                        )}
                                        <div className="mt-14 pt-12 border-t border-white/5 flex flex-col gap-8">
