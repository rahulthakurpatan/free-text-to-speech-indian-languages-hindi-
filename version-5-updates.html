<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", size = 20 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;

                    const currentScroll = window.scrollY;

                    title: "5. Smarter Punctuation Intelligence",

                    id: "byok",
                    title: "8. Enhanced BYOK Security & Key Management",
                    icon: "shield-check",
                    iconColor: "text-blue-700",
                    content: "Privacy remains our top priority. In v5.0, we've improved how your API keys are stored in your local browser. The 'Bring Your Own Key' (BYOK) model is now more secure, with better encryption and faster activation. We've also added a 'Key Health' indicator that tells you if your key is working correctly or if you've hit your Google quota. This transparent approach ensures that you always know the status of your free text to voice ai engine, giving you total peace of mind while you focus on your creative work."
                },

                    iconColor: "text-cyan-600",

                    iconColor: "text-orange-600",

                    {/* Content Area */}

                                Evolution is at the heart of everything we do at Vāṇī Studio. We believe that professional audio technology shouldn't just be accessible; it should be perfect. For the past few months, our team has been working tirelessly on the v5.0 stable release, focusing on the core elements that matter most to you: speed, sound quality, and reliability.

                        {/* Detailed 10 Points */}
